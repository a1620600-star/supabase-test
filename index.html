<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام المدرسة</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f7fa;
  margin: 0;
}

header {
  background: #0a2540;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
}

button {
  background: #0070f3;
  color: white;
  border: none;
  cursor: pointer;
}

.card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<header>
<h2>نظام إدارة المدرسة</h2>
</header>

<div class="container">

<h3>إضافة سجل جديد</h3>

<input id="name" placeholder="اسم العنصر">
<input type="file" id="file">

<button onclick="addData()">حفظ + رفع شاهد</button>

<hr>

<h3>البيانات</h3>
<div id="list"></div>

</div>

<script>

const SUPABASE_URL = "https://eslpnwxezkhddqxnhdlh.supabase.co";
const SUPABASE_KEY = "sb_publishable_CiDtetBcI8pHxliy14Mhxg_yH1dgiL4";

// ======================
// إضافة بيانات + رفع ملف
// ======================
async function addData() {

  const name = document.getElementById("name").value;
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!name) {
    alert("اكتب الاسم");
    return;
  }

  let fileUrl = null;

  try {

    // رفع الملف
    if (file) {

      const fileName = Date.now() + "_" + file.name;

      const uploadRes = await fetch(
        `${SUPABASE_URL}/storage/v1/object/files/${fileName}`,
        {
          method: "POST",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": file.type
          },
          body: file
        }
      );

      if (!uploadRes.ok) {
        throw new Error("فشل رفع الملف");
      }

      fileUrl = `${SUPABASE_URL}/storage/v1/object/public/files/${fileName}`;
    }

    // حفظ في قاعدة البيانات
    const res = await fetch(`${SUPABASE_URL}/rest/v1/core`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        title: name,
        type: "general",
        file_url: fileUrl
      })
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }

    alert("تم الحفظ");
    loadData();

  } catch (err) {
    alert("خطأ: " + err.message);
  }
}

// ======================
// جلب البيانات
// ======================
async function loadData() {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/core?select=*`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${item.title}</b><br>
      ${item.file_url ? `<a href="${item.file_url}" target="_blank">عرض الشاهد</a>` : "لا يوجد ملف"}
    `;

    list.appendChild(div);
  });
}

// تشغيل عند فتح الصفحة
loadData();

</script>

</body>
</html>
