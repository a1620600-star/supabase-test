<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار نهائي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>اختبار رفع ملف</h2>

<input type="file" id="f">
<button onclick="go()">رفع</button>

<script>
const s = window.supabase.createClient(
  "https://eslpnwxezkhddqxnhdlh.supabase.co",
  "sb_publishable_CiDtetBcI8pHxliy14Mhxg_yH1dgiL4"
);

async function go(){
  const file = document.getElementById("f").files[0];
  if(!file){ alert("اختر ملف"); return; }

  const name = Date.now()+file.name;

  const { error } = await s.storage.from("files").upload(name, file);

  if(error){
    alert(error.message);
    console.log(error);
    return;
  }

  alert("نجح الرفع");
}
</script>

</body>
</html>
