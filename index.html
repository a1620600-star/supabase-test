<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://eslpnwxezkhddqxnhdlh.supabase.co",
  "sb_publishable_CiDtetBcI8pHxliy14Mhxg_yH1dgiL4"
);

async function uploadFile(file) {
  const fileName = Date.now() + "_" + file.name;

  const { data, error } = await supabase
    .storage
    .from("files")
    .upload(fileName, file);

  if (error) {
    alert("خطأ: " + error.message);
    return null;
  }

  const { data: publicUrl } = supabase
    .storage
    .from("files")
    .getPublicUrl(fileName);

  return publicUrl.publicUrl;
}

async function addData() {
  const fileInput = document.querySelector("input[type='file']");
  const nameInput = document.querySelector("input[type='text']");

  const file = fileInput.files[0];
  if (!file) {
    alert("اختر ملف");
    return;
  }

  const fileUrl = await uploadFile(file);
  if (!fileUrl) return;

  const res = await fetch(
    "https://eslpnwxezkhddqxnhdlh.supabase.co/rest/v1/core",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": "sb_publishable_CiDtetBcI8pHxliy14Mhxg_yH1dgiL4",
        "Authorization": "Bearer sb_publishable_CiDtetBcI8pHxliy14Mhxg_yH1dgiL4"
      },
      body: JSON.stringify({
        type: "file",
        title: nameInput.value || "بدون اسم",
        file_url: fileUrl
      })
    }
  );

  if (!res.ok) {
    alert("فشل حفظ البيانات");
  } else {
    alert("تم بنجاح");
    location.reload();
  }
}
</script>
